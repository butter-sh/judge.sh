name: Tests

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v3
    
    - name: Set up environment
      run: |
        chmod +x ./judge.sh
        chmod +x ./run-all-tests.sh
        chmod +x ./setup-snapshots.sh
        chmod +x ./snapshot-tool.sh
        chmod +x ./test-helpers.sh
        chmod +x ./test-example.sh
    
    - name: Run tests
      run: |
        ./judge.sh run -v
    
    - name: Check snapshot differences
      if: failure()
      run: |
        ./judge.sh snap list
        echo "Tests failed. Review snapshot differences above."
    
    - name: Upload test results
      if: always()
      uses: actions/upload-artifact@v3
      with:
        name: test-snapshots
        path: snapshots/
        retention-days: 7

  snapshot-check:
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v3
    
    - name: Set up environment
      run: |
        chmod +x ./judge.sh
        chmod +x ./snapshot-tool.sh
    
    - name: Check for snapshot changes
      run: |
        if git diff --name-only origin/main...HEAD | grep -q "snapshots/.*_master.log"; then
          echo "⚠️ Master snapshots have been modified"
          echo "Modified snapshots:"
          git diff --name-only origin/main...HEAD | grep "snapshots/.*_master.log" || true
          echo ""
          echo "Please ensure these changes are intentional."
        else
          echo "✓ No master snapshot changes detected"
        fi
